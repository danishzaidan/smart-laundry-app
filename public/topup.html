<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasir & Top-Up - Smart Laundry</title>
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Default (Dark Theme) */
            --primary: #2563eb; 
            --primary-dark: #1d4ed8; 
            --bg: #090d16;
            --bg-radial: radial-gradient(circle at bottom left, #0b1120, #030712);
            --card: rgba(15, 23, 42, 0.5); 
            --card-border: rgba(255, 255, 255, 0.06);
            --card-hover-border: rgba(56, 189, 248, 0.2);
            --text-main: #f8fafc; 
            --text-sub: #94a3b8;
            --success: #10b981; 
            --danger: #ef4444; 
            --sidebar: #0d1321;
            --sidebar-border: rgba(255, 255, 255, 0.05);
            --sidebar-btn-hover: rgba(255, 255, 255, 0.05);
            --sidebar-btn-active: rgba(37, 99, 235, 0.15);
            --user-profile-bg: rgba(30, 41, 59, 0.4);
            --user-profile-border: rgba(255, 255, 255, 0.05);
            --menu-btn-bg: rgba(30, 41, 59, 0.5);
            --menu-btn-border: rgba(255, 255, 255, 0.1);
            --menu-btn-text: #f8fafc;
            --card-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
            --card-shadow-hover: 0 15px 35px -5px rgba(0,0,0,0.6);
            --accent-color: #38bdf8;
            --input-bg: rgba(30, 41, 59, 0.4);
            --input-border: rgba(255, 255, 255, 0.1);
            --table-th-bg: rgba(30, 41, 59, 0.4);
            --table-hover-bg: rgba(255, 255, 255, 0.02);
        }

        :root.light-theme {
            /* Light Theme */
            --bg: #f8fafc;
            --bg-radial: radial-gradient(circle at bottom left, #f1f5f9, #f8fafc);
            --card: rgba(255, 255, 255, 0.85);
            --card-border: rgba(203, 213, 225, 0.8);
            --card-hover-border: rgba(37, 99, 235, 0.4);
            --text-main: #0f172a;
            --text-sub: #475569;
            --sidebar: #1e293b;
            --sidebar-border: rgba(0, 0, 0, 0.08);
            --sidebar-btn-hover: rgba(255, 255, 255, 0.08);
            --sidebar-btn-active: rgba(37, 99, 235, 0.12);
            --user-profile-bg: rgba(15, 23, 42, 0.06);
            --user-profile-border: rgba(15, 23, 42, 0.05);
            --menu-btn-bg: #ffffff;
            --menu-btn-border: rgba(203, 213, 225, 0.8);
            --menu-btn-text: #0f172a;
            --card-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -2px rgba(0,0,0,0.05);
            --card-shadow-hover: 0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -4px rgba(0,0,0,0.08);
            --accent-color: #2563eb;
            --input-bg: rgba(255, 255, 255, 0.85);
            --input-border: rgba(203, 213, 225, 0.8);
            --table-th-bg: rgba(241, 245, 249, 0.8);
            --table-hover-bg: rgba(15, 23, 42, 0.02);
        }

        body { 
            font-family: 'Outfit', sans-serif; 
            background: var(--bg-radial);
            color: var(--text-main); 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
            transition: background 0.3s ease, color 0.3s ease;
        }
        
        /* --- GAYA SIDEBAR --- */
        .sidebar { 
            width: 260px; 
            box-sizing: border-box; 
            background-color: var(--sidebar); 
            color: white; 
            padding: 25px 15px; 
            display: flex; 
            flex-direction: column; 
            flex-shrink: 0;
            transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1), left 0.3s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.3s ease, border-color 0.3s ease;
            position: relative;
            z-index: 1000;
            border-right: 1px solid var(--sidebar-border);
            overflow-y: auto;
        }

        .sidebar.hide-desktop { margin-left: -260px; }

        .sidebar-header, .user-profile, .sidebar-btn, .logout-btn {
            flex-shrink: 0;
        }

        .sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .sidebar-header h2 { margin: 0; color: #38bdf8; font-size: 22px; font-weight: 700; }
        
        .close-sidebar-btn { background: none; border: none; color: #94a3b8; font-size: 20px; cursor: pointer; display: none; }

        .user-info { 
            background: var(--user-profile-bg); 
            border: 1px solid var(--user-profile-border);
            padding: 12px 15px; 
            border-radius: 10px; 
            margin-bottom: 25px; 
            font-size: 14px; 
            transition: all 0.3s ease;
        }
        
        .sidebar-btn { 
            width: 100%; 
            padding: 12px 15px; 
            margin-bottom: 10px; 
            background: transparent; 
            color: #94a3b8; 
            border: 1px solid var(--sidebar-border); 
            border-radius: 8px; 
            text-align: left; 
            cursor: pointer; 
            font-size: 15px; 
            font-weight: 600;
            font-family: inherit;
            transition: all 0.2s ease;
        }
        .sidebar-btn:hover { 
            background-color: var(--sidebar-btn-hover); 
            color: white; 
        }
        .sidebar-btn.active { 
            background-color: var(--sidebar-btn-active); 
            color: var(--accent-color); 
            border-color: var(--accent-color);
            border-left: 4px solid var(--accent-color); 
        }
        
        .logout-btn { 
            margin-top: auto; 
            background: rgba(244, 63, 94, 0.1); 
            border: 1px solid rgba(244, 63, 94, 0.2); 
            color: var(--danger); 
            padding: 12px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            font-family: inherit;
            transition: all 0.2s ease;
        }
        .logout-btn:hover {
            background: rgba(244, 63, 94, 0.2);
            box-shadow: 0 0 15px rgba(244, 63, 94, 0.1);
        }
        
        /* --- GAYA KONTEN UTAMA --- */
        .content { 
            flex: 1; 
            padding: 30px; 
            overflow-y: auto; 
            color: var(--text-main); 
            transition: all 0.3s ease; 
            box-sizing: border-box; 
            width: 100%; 
        }
        
        .content::-webkit-scrollbar {
            width: 6px;
        }
        .content::-webkit-scrollbar-track {
            background: transparent;
        }
        .content::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
        
        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; }
        .header h2 { margin: 0; font-size: 24px; font-weight: 700; }
        
        .menu-btn {
            background: var(--menu-btn-bg); 
            border: 1px solid var(--menu-btn-border); 
            color: var(--menu-btn-text); 
            font-size: 20px;
            cursor: pointer; 
            padding: 8px 14px; 
            border-radius: 8px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            flex-shrink: 0; 
            transition: all 0.2s ease, background-color 0.3s ease, border-color 0.3s ease;
        }
        .menu-btn:hover { 
            background: var(--menu-btn-bg); 
            border-color: var(--accent-color);
        }

        .card { 
            background: var(--card); 
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--card-border);
            padding: 25px; 
            border-radius: 14px; 
            box-shadow: var(--card-shadow); 
            margin-bottom: 20px; 
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease, background-color 0.3s ease;
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: var(--card-shadow-hover);
            border-color: var(--card-hover-border);
        }
        
        .grid-1-2 { display: grid; grid-template-columns: 1.2fr 2fr; gap: 20px; }
        
        label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-sub);
            display: block;
            margin-bottom: 5px;
        }

        input { 
            width: 100%; 
            padding: 14px 16px; 
            margin: 8px 0 20px 0; 
            box-sizing: border-box; 
            background: var(--input-bg);
            border: 1px solid var(--input-border); 
            border-radius: 10px; 
            color: var(--text-main);
            font-size: 15px;
            font-family: inherit;
            transition: all 0.3s ease;
        }
        input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 12px rgba(56, 189, 248, 0.3);
            background: var(--input-bg);
        }
        
        .btn-submit { 
            width: 100%; 
            padding: 14px; 
            background: linear-gradient(135deg, #10b981, #059669); 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-weight: 700; 
            font-size: 16px; 
            font-family: inherit;
            cursor: pointer; 
            transition: all 0.3s ease; 
            box-shadow: 0 4px 14px rgba(16, 185, 129, 0.3);
        }
        .btn-submit:hover { 
            background: linear-gradient(135deg, #34d399, #10b981); 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.5);
        }
        .btn-submit:active {
            transform: translateY(0);
        }

        #msgBox {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 600;
            text-align: center;
            border: 1px solid transparent;
        }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 14px; text-align: left; border-bottom: 1px solid var(--card-border); transition: border-color 0.3s ease; }
        th { background: var(--table-th-bg); font-weight: 600; color: var(--text-sub); transition: background-color 0.3s ease, color 0.3s ease; }
        tr:hover td { background: var(--table-hover-bg); }

        /* --- MOBILE SIDEBAR BACKDROP --- */
        .sidebar-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .sidebar-backdrop.show {
            opacity: 1;
            pointer-events: auto;
        }

        /* --- MODE LAYAR HP & TABLET (MOBILE) --- */
        @media (max-width: 992px) {
            .sidebar { 
                position: fixed; 
                height: 100vh; 
                height: 100dvh;
                left: -260px; 
                margin-left: 0; 
                top: 0;
            }
            .sidebar.show-mobile { 
                left: 0; 
                box-shadow: 10px 0 30px rgba(0,0,0,0.6); 
            }
            .close-sidebar-btn { display: block; }
            
            .content { padding: 20px 15px; }
            .grid-1-2 { grid-template-columns: 1fr; gap: 15px; }
            
            .table-container { overflow-x: auto; }
            table { min-width: 500px; }
        }
    </style>
</head>
<body>

    <div class="sidebar-backdrop" id="sidebarBackdrop" onclick="toggleSidebar()"></div>

    <div class="sidebar">
        <div class="sidebar-header">
            <h2>🌀 Smart Laundry</h2>
            <button class="close-sidebar-btn" onclick="toggleSidebar()">✖</button>
        </div>
        <div class="user-info">
            <span style="color: #94a3b8;">Kasir Aktif:</span><br>
            <b id="namaUser" style="color: #38bdf8; font-size: 16px;">-</b>
        </div>
        <button class="sidebar-btn active" onclick="window.location.href='/topup'">💳 Kasir & Top-Up</button>
        <button class="sidebar-btn" onclick="window.location.href='/register'">👤 Registrasi Kartu</button>
        <button class="sidebar-btn" onclick="toggleTheme()">🌓 Ganti Tema</button>
        <button class="sidebar-btn logout-btn" onclick="logout()">🚪 Logout</button>
    </div>

    <div class="content">
        <div class="header">
            <button class="menu-btn" onclick="toggleSidebar()">☰</button>
            <h2>Dashboard Operasional Kasir</h2>
        </div>
        
        <div class="grid-1-2">
            <div class="card">
                <h3 style="margin-top: 0;">💳 Isi Saldo</h3>
                <div id="msgBox" style="padding: 12px; border-radius: 8px; display: none; margin-bottom: 15px; font-weight: bold; text-align: center;"></div>
                <form id="topupForm">
                    <label style="font-weight: 600;">UID Kartu RFID</label>
                    <input type="text" id="uid" placeholder="Contoh: A1B2C3D4" required>
                    
                    <label style="font-weight: 600;">Nominal (Rp)</label>
                    <input type="number" id="nominal" placeholder="Contoh: 50000" required>
                    
                    <button type="submit" class="btn-submit">PROSES TOP-UP</button>
                </form>
            </div>
            
            <div class="card">
                <h3 style="margin-top: 0;">📜 Riwayat Transaksi</h3>
                <div class="table-container">
                    <table>
                        <thead><tr><th>ID</th><th>Nama User</th><th>Biaya</th><th>Waktu</th></tr></thead>
                        <tbody id="tabelRiwayat"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // SISTEM KEAMANAN & SESI
        const role = localStorage.getItem('role');
        if (role !== 'admin') { window.location.href = '/login'; } 
        else { document.getElementById('namaUser').innerText = localStorage.getItem('nama'); }

        function logout() { localStorage.clear(); window.location.href = '/login'; }

        // THEME MANAGER
        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            if (savedTheme === 'light') {
                document.documentElement.classList.add('light-theme');
            } else {
                document.documentElement.classList.remove('light-theme');
            }
        }

        function toggleTheme() {
            const isLight = document.documentElement.classList.toggle('light-theme');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        }

        // Run immediately
        initTheme();

        // FUNGSI ANIMASI SIDEBAR
        function toggleSidebar() {
            const sidebar = document.querySelector('.sidebar');
            const backdrop = document.getElementById('sidebarBackdrop');
            if (window.innerWidth <= 992) {
                sidebar.classList.toggle('show-mobile'); // Mode HP
                backdrop.classList.toggle('show', sidebar.classList.contains('show-mobile'));
            } else {
                sidebar.classList.toggle('hide-desktop'); // Mode Laptop
            }
        }

        // FUNGSI TOP UP & RIWAYAT
        async function loadRiwayat() {
            try {
                const res = await fetch('/api/transaksi');
                const result = await res.json();
                if (result.status === 'success') {
                    const tbody = document.getElementById('tabelRiwayat'); tbody.innerHTML = '';
                    result.data.forEach(trx => {
                        tbody.innerHTML += `<tr>
                            <td style="color: #64748b;">#${trx.id_transaksi}</td>
                            <td><b>${trx.nama_user}</b></td>
                            <td style="color: #ef4444; font-weight: bold;">- Rp ${trx.total_biaya.toLocaleString('id-ID')}</td>
                            <td style="color: #64748b;">${new Date(trx.waktu_transaksi).toLocaleString('id-ID')}</td>
                        </tr>`;
                    });
                }
            } catch (e) { console.log("Gagal memuat riwayat"); }
        }

        document.getElementById('topupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const rfid_uid = document.getElementById('uid').value;
            const nominal = parseInt(document.getElementById('nominal').value);
            const msg = document.getElementById('msgBox');
            
            try {
                const res = await fetch('/api/user/topup', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ rfid_uid, nominal })
                });
                const result = await res.json();
                
                msg.style.display = 'block';
                if (res.status === 200) {
                    msg.style.background = '#d1fae5'; msg.style.color = '#10b981'; msg.innerText = result.pesan;
                    document.getElementById('nominal').value = ''; 
                    loadRiwayat(); // Refresh tabel setelah topup sukses
                } else {
                    msg.style.background = '#fee2e2'; msg.style.color = '#ef4444'; msg.innerText = result.pesan;
                }
                setTimeout(() => msg.style.display = 'none', 3000);
            } catch (e) {
                msg.style.display = 'block';
                msg.style.background = '#fee2e2'; msg.style.color = '#ef4444'; msg.innerText = "Error Jaringan Server!";
                setTimeout(() => msg.style.display = 'none', 3000);
            }
        });

        // Muat data tabel saat halaman pertama dibuka, lalu update tiap 5 detik
        loadRiwayat();
        setInterval(loadRiwayat, 5000);
    </script>
</body>
</html>
