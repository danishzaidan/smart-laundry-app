<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Laundry</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #0f172a; 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; /* Diubah dari height ke min-height agar tidak rusak saat keyboard HP muncul */
            margin: 0; 
            padding: 20px; /* Agar kotak tidak menempel ketat di pinggir layar HP */
            box-sizing: border-box;
        }
        
        .card { 
            background: white; 
            padding: 40px 30px; 
            border-radius: 12px; 
            color: #1e293b; 
            width: 100%; /* Lebar dibuat fleksibel */
            max-width: 350px; /* Tapi dibatasi maksimal 350px agar tetap rapi di PC */
            text-align: center; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); /* Tambahan bayangan biar lebih estetik */
            box-sizing: border-box;
        }
        
        input { 
            width: 100%; 
            padding: 12px 15px; 
            margin: 10px 0 20px; 
            box-sizing: border-box; 
            border: 1px solid #cbd5e1; 
            border-radius: 8px; 
            font-size: 15px;
        }
        
        button { 
            width: 100%; 
            padding: 14px; 
            background: #2563eb; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 16px;
            cursor: pointer; 
            transition: background 0.2s;
        }
        
        button:hover { background: #1d4ed8; }
        
        #errorMsg {
            background: #fee2e2;
            color: #ef4444;
            padding: 10px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="margin-top: 0;">Smart Laundry</h2>
        <p style="color:#64748b; font-size: 14px; margin-bottom:25px;">Silakan masuk ke akun Anda</p>
        
        <div id="errorMsg" style="display:none; margin-bottom:15px;"></div>
        
        <form id="loginForm" onsubmit="event.preventDefault(); login();">
            <input type="text" id="username" placeholder="Username (owner / admin)" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">MASUK</button>
        </form>
    </div>

    <script>
        // Cek jika sudah login, langsung lempar ke halaman masing-masing
        const userRole = localStorage.getItem('role');
        if (userRole === 'owner') window.location.href = '/dashboard';
        if (userRole === 'admin') window.location.href = '/topup';

        async function login() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const msg = document.getElementById('errorMsg');
            
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });
                const result = await res.json();

                if (res.status === 200) {
                    // SIMPAN SESI LOGIN DI BROWSER (Local Storage)
                    localStorage.setItem('role', result.role);
                    localStorage.setItem('nama', result.nama);
                    
                    // PINDAH HALAMAN (URL BERUBAH)
                    if (result.role === 'owner') window.location.href = '/dashboard';
                    else window.location.href = '/topup';
                } else {
                    msg.style.display = 'block';
                    msg.innerText = result.pesan;
                }
            } catch (e) { 
                msg.style.display = 'block';
                msg.innerText = "Koneksi ke Server Gagal!";
            }
        }
    </script>
</body>
</html>
