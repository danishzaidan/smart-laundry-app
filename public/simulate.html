<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesin Cuci - Mode User (Simulasi)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Outfit', sans-serif; 
            background: radial-gradient(circle at bottom, #0d1222, #050811); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            color: #f8fafc;
        }
        
        .machine-body { 
            background: rgba(15, 23, 42, 0.65); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            width: 400px; 
            padding: 30px; 
            border-radius: 24px; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.6); 
            box-sizing: border-box;
        }
        
        h3 {
            font-weight: 700;
            font-size: 20px;
            color: #f8fafc;
            letter-spacing: 0.5px;
        }
        
        .lcd-screen { 
            background: #020617; 
            color: #38bdf8; 
            padding: 22px 15px; 
            border-radius: 12px; 
            text-align: center; 
            margin-bottom: 25px; 
            font-family: 'Courier New', Courier, monospace; 
            border: 2px solid rgba(56, 189, 248, 0.2); 
            box-shadow: inset 0 0 20px rgba(56, 189, 248, 0.15), 0 0 15px rgba(56, 189, 248, 0.05);
        }
        
        .lcd-status { font-size: 24px; font-weight: bold; margin-bottom: 12px; letter-spacing: 1px; }
        .lcd-info { font-size: 14px; color: #94a3b8; white-space: pre-line; line-height: 1.5; }
        
        .led-container { display: flex; justify-content: center; gap: 24px; margin-bottom: 25px; }
        .led { 
            width: 18px; 
            height: 18px; 
            border-radius: 50%; 
            transition: all 0.3s ease; 
        }
        .led.merah {
            background: rgba(239, 68, 68, 0.2); 
            border: 2px solid rgba(239, 68, 68, 0.4);
        }
        .led.merah.nyala { 
            background: #ef4444; 
            border-color: #ef4444;
            box-shadow: 0 0 15px #ef4444, 0 0 30px rgba(239, 68, 68, 0.5); 
        }
        .led.hijau {
            background: rgba(16, 185, 129, 0.2); 
            border: 2px solid rgba(16, 185, 129, 0.4);
        }
        .led.hijau.nyala { 
            background: #10b981; 
            border-color: #10b981;
            box-shadow: 0 0 15px #10b981, 0 0 30px rgba(16, 185, 129, 0.5); 
        }
        
        .rfid-area { 
            border: 2px dashed rgba(255, 255, 255, 0.12); 
            padding: 20px; 
            border-radius: 12px; 
            text-align: center; 
            background: rgba(30, 41, 59, 0.25); 
        }
        
        label {
            font-size: 14px;
            font-weight: 600;
            color: #94a3b8;
            display: block;
            margin-bottom: 8px;
        }

        input { 
            width: 100%; 
            padding: 14px; 
            margin: 10px 0; 
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 8px; 
            box-sizing: border-box; 
            text-align: center; 
            font-size: 18px; 
            font-weight: bold; 
            color: white;
            font-family: inherit;
            transition: all 0.3s ease;
        }
        input:focus {
            outline: none;
            border-color: #38bdf8;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
            background: rgba(15, 23, 42, 0.8);
        }
        
        .btn-stop { 
            width: 100%; 
            padding: 15px; 
            background: linear-gradient(135deg, #e11d48, #be123c); 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-weight: bold; 
            font-size: 16px;
            font-family: inherit;
            cursor: pointer; 
            margin-top: 15px; 
            display: none; 
            transition: all 0.3s ease;
            box-shadow: 0 4px 14px rgba(225, 29, 72, 0.3);
        }
        .btn-stop:hover {
            background: linear-gradient(135deg, #f43f5e, #e11d48);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(225, 29, 72, 0.5);
        }
        .btn-stop:active {
            transform: translateY(0);
        }

        /* --- CODE TAMBAHAN UNTUK LAYAR SIMULATOR DI HP --- */
        @media (max-width: 480px) {
            body { padding: 15px; box-sizing: border-box; }
            .machine-body { width: 100%; max-width: 100%; padding: 25px 20px; }
        }
        .waiting-text { color: #38bdf8; font-weight: 600; font-size: 14px; animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="machine-body">
        <h3 style="text-align: center; margin-top: 0;">SMART LAUNDRY (MESIN-01)</h3>
        <div class="led-container">
            <div id="ledMerah" class="led merah nyala"></div>
            <div id="ledHijau" class="led hijau"></div>
        </div>
        <div class="lcd-screen">
            <div id="lcdText" class="lcd-status">SILAKAN TAP<br>KARTU ANDA</div>
            <div id="lcdSub" class="lcd-info">Tarif: Rp 7.000 / Kg</div>
        </div>
        
        <div class="rfid-area" id="rfidArea">
            <label style="font-weight: bold; display: block; font-size: 14px;">⚖️ Isi Berat Cucian Dulu (Kg)</label>
            <input type="number" id="beratInput" value="3.0" min="0.5" step="0.1">
            
            <p class="waiting-text" style="margin-top: 15px; margin-bottom: 0;">⏳ Menunggu scan kartu di Wokwi...</p>
        </div>

        <button id="btnStop" class="btn-stop" onclick="hentikanMesin()">SELESAI MENCUCI (STOP)</button>
    </div>

    <script>
        let intervalMesin = null;

        // RADAR PENANGKAP SINYAL WOKWI
        setInterval(async () => {
            // Jangan mengecek kalau layar sedang menampilkan "MEMPROSES" atau Mesin sudah nyala
            if (document.getElementById('rfidArea').style.display === 'none') return; 
            
            try {
                const res = await fetch('/api/iot/rfid_scan');
                const result = await res.json();
                
                // Jika ada UID yang ditangkap dari server (berasal dari Wokwi)
                if (result.uid && result.uid !== "") {
                    // Langsung jalankan proses dengan UID tersebut
                    simulasikanTap(result.uid); 
                }
            } catch(e) {}
        }, 1000); // Mengecek setiap 1 detik

        // Fungsi diubah untuk menerima UID sebagai parameter
        async function simulasikanTap(uidDariWokwi) {
            const berat = document.getElementById('beratInput').value.trim();
            const lcdText = document.getElementById('lcdText');
            const lcdSub = document.getElementById('lcdSub');
            
            if(!berat || berat <= 0) { 
                alert("Harap isi berat cucian terlebih dahulu sebelum tap kartu di Wokwi!"); 
                return; 
            }

            lcdText.innerText = "MEMPROSES...";
            lcdSub.innerText = "Menghitung...";

            try {
                const res = await fetch('/api/iot/tap', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ rfid_uid: uidDariWokwi, berat_kg: berat })
                });
                
                const result = await res.json();

                if (res.status === 200) {
                    lcdText.innerText = "MESIN MENYALA";
                    lcdText.style.color = "#10b981";
                    lcdSub.innerText = `Biaya: Rp ${result.total_biaya.toLocaleString('id-ID')}\nSisa: Rp ${result.sisa_saldo.toLocaleString('id-ID')}`;
                    
                    document.getElementById('ledMerah').classList.remove('nyala');
                    document.getElementById('ledHijau').classList.add('nyala');
                    document.getElementById('rfidArea').style.display = 'none';
                    document.getElementById('btnStop').style.display = 'block';

                    jalankanSensorVirtual();
                } else {
                    lcdText.innerText = "AKSES DITOLAK";
                    lcdText.style.color = "#ef4444";
                    lcdSub.innerText = result.pesan;
                    setTimeout(resetLayar, 4000);
                }
            } catch (err) {
                lcdText.innerText = "ERROR SERVER!";
                lcdSub.innerText = "Cek terminal Node.js\ndi VS Code kamu.";
                console.error("Detail Error:", err);
            }
        }

        function jalankanSensorVirtual() {
            intervalMesin = setInterval(() => {
                fetch('/api/iot/log', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id_mesin: 'MESIN-01', watt: (200 + Math.random() * 50).toFixed(2), flow_liter: (10 + Math.random() * 5).toFixed(2), status_mesin: 'MENCUCI' })
                });
            }, 2000);
        }

        function hentikanMesin() {
            clearInterval(intervalMesin);
            fetch('/api/iot/log', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id_mesin: 'MESIN-01', watt: 0, flow_liter: 0, status_mesin: 'STANDBY' })
            });
            resetLayar();
        }

        function resetLayar() {
            const lcdText = document.getElementById('lcdText');
            lcdText.innerText = "SILAKAN TAP\nKARTU ANDA";
            lcdText.style.color = "#38bdf8";
            document.getElementById('lcdSub').innerText = "Tarif: Rp 7.000 / Kg";
            document.getElementById('ledMerah').classList.add('nyala');
            document.getElementById('ledHijau').classList.remove('nyala');
            document.getElementById('rfidArea').style.display = 'block';
            document.getElementById('btnStop').style.display = 'none';
        }
    </script>
</body>
</html>
